name: PR Title
on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  check-title:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          scopes: |
            ear-trainer
            tuner
            pulse
            chord-ref
            rhythm
            progressions
            practice-timer
            drone
            practice-guide
            songbook
            server
            ci
          requireScope: false
          subjectPattern: ^.+$
          subjectPatternError: "PR title must have a description after the type"
