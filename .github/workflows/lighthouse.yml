name: Lighthouse
on:
  deployment_status:

jobs:
  audit:
    if: >
      github.event.deployment_status.state == 'success' &&
      github.event.deployment.environment == 'github-pages'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set deployment URL
        id: url
        run: |
          RAW="${{ github.event.deployment_status.environment_url }}"
          # Ensure trailing slash for reliable path joining
          echo "base=${RAW%/}/" >> $GITHUB_OUTPUT

      - name: Lighthouse audit (mobile)
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            ${{ steps.url.outputs.base }}
            ${{ steps.url.outputs.base }}src/ear-trainer.html
            ${{ steps.url.outputs.base }}src/tuner.html
            ${{ steps.url.outputs.base }}src/pulse.html
            ${{ steps.url.outputs.base }}src/drone.html
            ${{ steps.url.outputs.base }}src/practice-timer.html
            ${{ steps.url.outputs.base }}src/chord-reference.html
          uploadArtifacts: true
          artifactName: lighthouse-mobile

      - name: Lighthouse audit (desktop)
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            ${{ steps.url.outputs.base }}
            ${{ steps.url.outputs.base }}src/ear-trainer.html
            ${{ steps.url.outputs.base }}src/tuner.html
            ${{ steps.url.outputs.base }}src/pulse.html
            ${{ steps.url.outputs.base }}src/drone.html
            ${{ steps.url.outputs.base }}src/practice-timer.html
            ${{ steps.url.outputs.base }}src/chord-reference.html
          uploadArtifacts: true
          artifactName: lighthouse-desktop
          configPath: .github/lighthouse/desktop.json
