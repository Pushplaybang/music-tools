name: Release
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: latest_tag
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Determine version bump
        id: bump
        run: |
          COMMITS=$(git log ${{ steps.latest_tag.outputs.tag }}..HEAD --pretty=format:"%s" 2>/dev/null || git log --max-count=50 --pretty=format:"%s")

          if echo "$COMMITS" | grep -qE "^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.*\))?!:"; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif echo "$COMMITS" | grep -qE "^feat(\(.*\))?:"; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Calculate next version
        id: version
        run: |
          CURRENT="${{ steps.latest_tag.outputs.tag }}"
          CURRENT="${CURRENT#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ steps.bump.outputs.type }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          echo "version=v${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          TAG="${{ steps.latest_tag.outputs.tag }}"
          DELIMITER="NOTES_$(openssl rand -hex 8)"
          COMMITS=$(git log "${TAG}..HEAD" --pretty=format:"%s" 2>/dev/null || git log --max-count=50 --pretty=format:"%s")
          TYPES=(feat fix docs style refactor perf test build ci chore revert)
          TYPE_REGEX="$(IFS='|'; echo "${TYPES[*]}")"

          declare -A NOTES
          for key in "${TYPES[@]}" other; do
            NOTES["$key"]=""
          done

          while IFS= read -r line; do
            [[ -z "$line" ]] && continue
            if [[ "$line" =~ ^(${TYPE_REGEX})(\(([^)]+)\))?(!)?:[[:space:]]*(.+)$ ]]; then
              type="${BASH_REMATCH[1]}"
              scope="${BASH_REMATCH[3]}"
              breaking="${BASH_REMATCH[4]}"
              msg="${BASH_REMATCH[5]}"
              if [[ -n "$breaking" ]]; then
                msg="[BREAKING] ${msg}"
              fi
              if [[ -n "$scope" ]]; then
                entry="- ${scope}: ${msg}"
              else
                entry="- ${msg}"
              fi
            else
              type="other"
              entry="- ${line}"
            fi

            NOTES["$type"]+="${entry}"$'\n'
          done <<< "$COMMITS"

          emit_section() {
            local key="$1"
            local title="$2"
            if [[ -n "${NOTES[$key]}" ]]; then
              printf "## %s\n" "${title}"
              printf "%s" "${NOTES[$key]}"
              printf "\n"
            fi
          }

          {
            echo "notes<<${DELIMITER}"
            emit_section "feat" "Features"
            emit_section "fix" "Fixes"
            emit_section "docs" "Documentation"
            emit_section "style" "Style"
            emit_section "refactor" "Refactors"
            emit_section "perf" "Performance"
            emit_section "test" "Tests"
            emit_section "build" "Build"
            emit_section "ci" "CI"
            emit_section "chore" "Chores"
            emit_section "revert" "Reverts"
            emit_section "other" "Other"
            echo ""
            echo "${DELIMITER}"
          } >> $GITHUB_OUTPUT

      - name: Create release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: '${{ steps.version.outputs.version }}',
              name: '${{ steps.version.outputs.version }}',
              body: `${{ steps.notes.outputs.notes }}`,
              draft: false,
              prerelease: false,
            });
